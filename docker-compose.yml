# Démarre une base MySQL pré-initialisée avec le schéma et les données.
#   docker compose up -d
# La base est accessible sur localhost:3306 (user root / mot de passe root).
services:
  mysql:
    image: mysql:8.4
    container_name: medbar-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mediatheque
    ports:
      - "3306:3306"
    volumes:
      - ./sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./sql/02_data.sql:/docker-entrypoint-initdb.d/02_data.sql:ro
      - medbar-data:/var/lib/mysql

volumes:
  medbar-data:
