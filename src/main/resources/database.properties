# =============================================================================
#  Configuration de la connexion JDBC à la base "mediatheque".
#  Ces valeurs sont prévues pour l'environnement de DÉVELOPPEMENT local
#  (Docker / poste de l'étudiant). En production, surchargez-les via les
#  variables d'environnement (le code donne priorité aux variables) :
#
#    MEDIATHEQUE_DB_URL=jdbc:mysql://serveur:3306/mediatheque?...
#    MEDIATHEQUE_DB_USER=mediatheque_app
#    MEDIATHEQUE_DB_PASSWORD=********
#
#  Voir DatabaseConnection.loadProperties() pour le détail.
# =============================================================================
db.url=jdbc:mysql://localhost:3306/mediatheque?useSSL=false&serverTimezone=Europe/Paris&allowPublicKeyRetrieval=true&characterEncoding=utf8
db.user=root
db.password=root
