# =============================================================================
#  CONNEXION JDBC A LA BASE "mediatheque"
#
#  La base MariaDB/MySQL est HEBERGEE SUR LE SERVEUR DU CLIENT LEGER
#  (installee et alimentee automatiquement par mediatheque-leger/deploy.sh).
#
#  >>> POUR CHANGER DE SERVEUR, MODIFIEZ UNIQUEMENT LA LIGNE db.host CI-DESSOUS.
#
#  En production, vous pouvez aussi tout surcharger via variables d'env :
#    MEDIATHEQUE_DB_HOST=192.168.1.50
#    MEDIATHEQUE_DB_USER=mediatheque
#    MEDIATHEQUE_DB_PASSWORD=********
#  (ou directement MEDIATHEQUE_DB_URL=jdbc:mysql://...)
# =============================================================================

# ---- A MODIFIER : IP ou hostname du serveur du client leger ----
db.host=A_REMPLIR

# ---- Valeurs par defaut (a ajuster uniquement si besoin) ----
db.port=3306
db.name=mediatheque
db.user=mediatheque
db.password=A_REMPLIR
